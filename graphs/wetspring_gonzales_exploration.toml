# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Gonzales Dermatitis Science Workflow — interactive exploration.
#
# Orchestrates the Gonzales dermatitis science pipeline:
# dose-response sweep → PK decay → tissue lattice → Anderson spectral →
# hormesis zone → cross-species comparison.
#
# Each step is a capability.call to existing science.* methods on wetSpring.
# petalTongue renders the full_gonzales_scenario composite visualization.
#
# Requires: wetspring_niche.toml deployed first (Tower + wetSpring + petalTongue).
#
# Usage:
#   biomeos deploy --graph graphs/wetspring_gonzales_exploration.toml

[graph]
name = "wetspring_gonzales_exploration"
description = "Gonzales dermatitis interactive science — IC50 + PK + tissue + hormesis + cross-species"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-11"
schema = "canonical"
composition_model = "nucleated"
science_domain = "life_science_chemistry"
owner = "wetSpring"
fragments = ["tower_atomic"]

# ── Pre-existing substrate ───────────────────────────────────────

[[graph.nodes]]
name = "biomeos"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["capability.discover"]

# ── Tower ────────────────────────────────────────────────────────

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos"]
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["discovery.find_primals"]

# ── Compute ──────────────────────────────────────────────────────

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = false
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit"]

# ── Visualization ────────────────────────────────────────────────

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "render"
security_model = "tower_delegated"
capabilities = ["render.dashboard", "tui.push"]

# ── Science primal ───────────────────────────────────────────────

[[graph.nodes]]
name = "wetspring"
binary = "wetspring"
order = 10
required = true
spawn = true
depends_on = ["beardog", "songbird"]
health_method = "health.check"
by_capability = "life_science"
security_model = "tower_delegated"
args = ["server"]
capabilities = [
    "science.anderson.cross_species",
    "science.anderson.hormesis",
    "science.gonzales.dose_response",
    "science.gonzales.pk_decay",
    "science.gonzales.tissue_lattice",
]

# ── Validation ───────────────────────────────────────────────────

[[graph.nodes]]
name = "validate_gonzales"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["wetspring", "petaltongue"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["coordination.validate_composition"]
