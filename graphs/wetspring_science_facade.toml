# SPDX-License-Identifier: AGPL-3.0-or-later
#
# wetSpring Science Facade — HTTP gateway for primals.eco live science.
#
# Deploys the science facade as a thin Axum service that translates
# browser REST requests into wetSpring JSON-RPC calls, with progressive
# provenance from the trio and petalTongue grammar rendering.
#
# Sits behind cloudflared tunnel (lab.primals.eco) with Dark Forest gate.
#
# Prerequisites:
#   1. wetSpring science primal running (JSON-RPC socket)
#   2. biomeOS + Tower running for Dark Forest auth
#   3. cloudflared configured with lab.primals.eco hostname
#   4. Optional: petalTongue for grammar rendering
#   5. Optional: provenance trio for Tier 2/3 lineage
#
# Usage:
#   biomeos deploy --graph graphs/wetspring_science_facade.toml

[graph]
name = "wetspring_science_facade"
description = "primals.eco live science — HTTP facade with provenance and petalTongue rendering"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-11"
schema = "canonical"
witness_wire = "WireWitnessRef"
composition_model = "nucleated"
science_domain = "life_science_chemistry"
owner = "wetSpring"
fragments = ["tower_atomic"]

# ═══════════════════════════════════════════════════════════════
# Phase 0: Orchestration (pre-existing)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["capability.discover", "graph.list"]

# ═══════════════════════════════════════════════════════════════
# Phase 1: Security + Discovery (pre-existing)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ═══════════════════════════════════════════════════════════════
# Phase 2: Science (required — the facade's data source)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "wetspring"
binary = "wetspring"
order = 10
required = true
spawn = true
depends_on = ["beardog", "songbird"]
health_method = "health.check"
by_capability = "life_science"
security_model = "tower_delegated"
args = ["server"]
capabilities = [
    "science.anderson.biome_atlas",
    "science.anderson.cross_species",
    "science.anderson.disorder_sweep",
    "science.anderson.hormesis",
    "science.gonzales.dose_response",
    "science.gonzales.pk_decay",
    "science.gonzales.tissue_lattice",
]

# ═══════════════════════════════════════════════════════════════
# Phase 3: Visualization (optional — petalTongue grammar rendering)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 11
required = false
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "render"
security_model = "tower_delegated"
capabilities = ["render.dashboard", "tui.push"]

# ═══════════════════════════════════════════════════════════════
# Phase 4: Provenance Trio (optional — progressive degradation)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 12
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "tower_delegated"
capabilities = ["dag.session.create", "dag.event.append"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 13
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["spine.create", "entry.append", "session.commit"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 14
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = ["braid.create", "braid.commit", "provenance.graph"]

# ═══════════════════════════════════════════════════════════════
# Phase 5: Science Facade (the HTTP gateway)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "science_facade"
binary = "wetspring_science_facade"
order = 20
required = true
spawn = true
depends_on = ["wetspring"]
health_method = "health.check"
by_capability = "http_gateway"
security_model = "tower_delegated"
capabilities = [
    "http.provenance.query",
    "http.render.grammar",
    "http.science.anderson",
    "http.science.gonzales",
]

[graph.nodes.env]
FACADE_BIND = "127.0.0.1:3100"
FACADE_CORS_ORIGIN = "https://primals.eco"
