# wetSpring biomeOS Deploy Graph
#
# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Follows: wateringHole/SPRING_AS_NICHE_DEPLOYMENT_STANDARD.md
#
# Germination order:
#   1. BearDog (security foundation)
#   2. Songbird (discovery)
#   3. rhizoCrypt + loamSpine + sweetGrass (provenance trio)
#   4. nestGate (content-addressed cache)
#   5. ToadStool + Squirrel (GPU compute + AI — optional)
#   6. petalTongue (visualization — optional)
#   7. wetSpring (science)
#   8. Validation
#
# Composition evolution opportunity: biomeOS can extend this graph
# with additional primals (airSpring, healthSpring) that consume
# wetSpring capabilities via cross-spring time series exchange.

[graph]
name = "wetspring_deploy"
version = "2.0.0"
description = "wetSpring life-science validation atop Node Atomic with provenance trio"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-10"
schema = "canonical"

# ── Phase 1: Tower Atomic ───────────────────────────────────────────

[[graph.node]]
name = "beardog"
order = 1
required = true
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519", "crypto.blake3_hash"]

[[graph.node]]
name = "songbird"
order = 2
required = true
depends_on = ["beardog"]
by_capability = "discovery"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ── Phase 2: Provenance Trio ────────────────────────────────────────

[[graph.node]]
name = "rhizocrypt"
order = 3
required = true
depends_on = ["beardog", "songbird"]
by_capability = "dag"
capabilities = ["provenance.session", "provenance.vertex"]

[[graph.node]]
name = "loamspine"
order = 3
required = true
depends_on = ["beardog", "songbird"]
by_capability = "commit"
capabilities = ["provenance.commit", "certificate.mint"]

[[graph.node]]
name = "sweetgrass"
order = 3
required = true
depends_on = ["beardog", "songbird"]
by_capability = "provenance"
capabilities = ["attribution.braid", "attribution.calculate"]

# ── Phase 3: Compute & Cache (Optional Enrichment) ─────────────────

[[graph.node]]
name = "nestgate"
order = 4
required = false
depends_on = ["beardog", "songbird"]
by_capability = "storage"
capabilities = ["storage.put", "storage.get", "storage.list"]

[[graph.node]]
name = "petaltongue"
order = 4
required = false
depends_on = ["beardog", "songbird"]
by_capability = "visualization"
capabilities = ["render.grammar", "render.scene"]

# ── Phase 3b: Optional ToadStool + Squirrel ───────────────────────────

[[graph.node]]
name = "toadstool"
order = 4
required = false
depends_on = ["beardog", "songbird"]
by_capability = "compute"
capabilities = ["compute.dispatch", "compute.performance_surface"]

[[graph.node]]
name = "squirrel"
order = 4
required = false
depends_on = ["beardog", "songbird"]
by_capability = "ai"
capabilities = ["ai.query", "inference.complete", "inference.embed"]

# ── Phase 4: wetSpring Science ──────────────────────────────────────

[[graph.node]]
name = "wetspring"
order = 10
required = true
depends_on = [
    "beardog",
    "songbird",
    "rhizocrypt",
    "loamspine",
    "sweetgrass",
]
by_capability = "science"
capabilities = [
    "ai.ecology_interpret",
    "brain.attention",
    "brain.observe",
    "brain.urgency",
    "metrics.snapshot",
    "provenance.begin",
    "provenance.complete",
    "provenance.record",
    "science.alignment",
    "science.anderson",
    "science.diversity",
    "science.full_pipeline",
    "science.kinetics",
    "science.ncbi_fetch",
    "science.nmf",
    "science.phylogenetics",
    "science.qs_model",
    "science.taxonomy",
    "science.timeseries",
    "science.timeseries_diversity",
]

# ── Phase 5: Validation ────────────────────────────────────────────

[[graph.node]]
name = "validate_wetspring_atomic"
order = 20
required = true
depends_on = [
    "beardog",
    "songbird",
    "wetspring",
]
by_capability = "validation"
capabilities = ["validation.health_check"]
