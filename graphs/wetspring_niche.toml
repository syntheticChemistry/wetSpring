# SPDX-License-Identifier: AGPL-3.0-or-later
#
# wetSpring Niche Deploy — science primal + petalTongue + optional toadStool.
#
# Deploys wetSpring as a biomeOS science niche with visualization.
# Follows the primalSpring BYOB graph schema (family A: [[graph.node]]).
#
# Usage:
#   biomeos deploy --graph graphs/wetspring_niche.toml

[graph]
name = "wetspring_science_niche"
description = "wetSpring ecology/metagenomics niche — Tower + ToadStool + wetSpring + petalTongue"
version = "1.0.0"
coordination = "sequential"

# ═══════════════════════════════════════════════════════════════
# Phase 0: biomeOS substrate (pre-existing, not spawned)
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "biomeos"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "graph.list", "graph.execute"]

# ═══════════════════════════════════════════════════════════════
# Phase 1: Tower Atomic (BearDog + Songbird)
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
depends_on = ["biomeos"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.identity"]

[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["biomeos"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["discovery.find_primals", "network.tls_connect"]

# ═══════════════════════════════════════════════════════════════
# Phase 2: Compute + Visualization
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "toadstool"
binary = "toadstool_primal"
order = 3
required = false
depends_on = ["beardog", "songbird"]
health_method = "compute.health"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[graph.node]]
name = "petaltongue"
binary = "petaltongue"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = ["visualization.render", "visualization.render.dashboard"]

# ═══════════════════════════════════════════════════════════════
# Phase 3: wetSpring science primal
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "wetspring"
binary = "wetspring"
order = 10
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.check"
by_capability = "ecology"
args = ["server"]
capabilities = [
    "science.diversity",
    "science.anderson",
    "science.qs_model",
    "science.kinetics",
    "science.alignment",
    "science.taxonomy",
    "science.phylogenetics",
    "science.nmf",
    "science.gonzales.dose_response",
    "science.gonzales.pk_decay",
    "science.gonzales.tissue_lattice",
    "science.anderson.biome_atlas",
    "science.anderson.disorder_sweep",
    "science.anderson.hormesis",
    "science.anderson.cross_species",
]

# ═══════════════════════════════════════════════════════════════
# Phase 4: Validation (primalSpring)
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "validate_wetspring"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["wetspring"]
health_method = "capability.list"
by_capability = "coordination"
capabilities = ["coordination.validate_composition"]
