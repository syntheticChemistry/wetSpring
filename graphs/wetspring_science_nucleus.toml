# SPDX-License-Identifier: AGPL-3.0-or-later
#
# wetSpring Science NUCLEUS — full primal ecosystem deployment.
#
# Supersedes wetspring_science_facade.toml: deploys the entire NUCLEUS
# composition (Tower + Node + Nest + provenance trio) alongside the
# science facade and petalTongue renderer.
#
# Every primal is exercised: Tower authenticates, Node computes,
# Nest stores, the provenance trio wraps every datum, petalTongue
# renders, and the science facade serves it all through Dark Forest.
#
# Witness wire: WireWitnessRef { agent, kind, evidence, witnessed_at,
#   encoding, algorithm, tier, context }
# BearDog crypto bridge: sign_ed25519 → evidence (base64), algorithm "ed25519"
# Non-crypto witnesses: kind "checkpoint" | "observation" for pipeline steps
#
# References:
#   wateringHole/handoffs/PRIMALSPRING_V082_WETSPRING_CAPABILITY_ROUTING_HANDOFF_APR07_2026.md
#   primalSpring/config/capability_registry.toml
#
# Usage:
#   biomeos deploy --graph graphs/wetspring_science_nucleus.toml

[graph]
name = "wetspring_science_nucleus"
description = "Full NUCLEUS science pipeline — Tower + Node + Nest + provenance trio + facade + petalTongue"
version = "3.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"

# ═══════════════════════════════════════════════════════════════
# Phase 0: Orchestration (pre-existing)
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

# ═══════════════════════════════════════════════════════════════
# Phase 1: Tower Atomic — BearDog + Songbird (security + discovery)
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519", "crypto.blake3_hash"]

[[graph.node]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ═══════════════════════════════════════════════════════════════
# Phase 2: Nest Atomic — NestGate (content-addressed storage)
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "nestgate"
binary = "nestgate"
order = 3
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage", "storage.store", "storage.retrieve", "storage.exists", "storage.list", "storage.fetch_external"]

# ═══════════════════════════════════════════════════════════════
# Phase 3: Node Atomic — ToadStool (compute dispatch to GPU/NPU)
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "toadstool"
binary = "toadstool"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "compute.dispatch.gpu", "compute.dispatch.npu", "compute.dispatch.cpu", "shader.dispatch", "ember.list"]

# ═══════════════════════════════════════════════════════════════
# Phase 4: Provenance Trio — rhizoCrypt + loamSpine + sweetGrass
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 5
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
args = ["--unix"]
capabilities = ["dag", "dag.session.create", "dag.session.get", "dag.session.list", "dag.event.append", "dag.vertex.get", "dag.frontier.get", "dag.merkle.root", "dag.merkle.proof", "dag.merkle.verify", "dag.slice.checkout", "dag.dehydrate"]

[[graph.node]]
name = "loamspine"
binary = "loamspine"
order = 6
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
args = ["server"]
capabilities = ["spine", "entry", "session", "certificate", "commit", "ledger", "spine.create", "spine.get", "spine.seal", "entry.append", "entry.get", "session.commit", "certificate.mint"]

[[graph.node]]
name = "sweetgrass"
binary = "sweetgrass"
order = 7
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
args = ["server"]
capabilities = ["braid", "attribution", "provenance", "anchoring", "braid.create", "braid.get", "braid.commit", "provenance.graph", "provenance.export_provo", "attribution.chain", "anchoring.anchor", "anchoring.verify"]

# ═══════════════════════════════════════════════════════════════
# Phase 5: Science — wetSpring IPC (the data source)
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "wetspring"
binary = "wetspring"
order = 10
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.check"
by_capability = "biology"
args = ["server"]
capabilities = [
    "science.gonzales.dose_response",
    "science.gonzales.pk_decay",
    "science.gonzales.tissue_lattice",
    "science.anderson.hormesis",
    "science.anderson.cross_species",
    "science.anderson.biome_atlas",
    "science.anderson.disorder_sweep",
    "science.diversity",
    "science.qs_model",
    "science.full_pipeline",
    "data.fetch.chembl",
    "data.fetch.pubchem",
    "data.fetch.register_table",
    "vault.store",
    "vault.retrieve",
    "vault.consent.verify",
    "composition.science_health",
    "composition.tower_health",
    "composition.node_health",
    "composition.nest_health",
    "composition.nucleus_health",
]

# ═══════════════════════════════════════════════════════════════
# Phase 6: Visualization — petalTongue grammar rendering
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "petaltongue"
binary = "petaltongue"
order = 11
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = ["visualization.render.grammar", "visualization.render.scene"]

# ═══════════════════════════════════════════════════════════════
# Phase 7: Science Facade — HTTP gateway (the public interface)
# ═══════════════════════════════════════════════════════════════

[[graph.node]]
name = "science_facade"
binary = "wetspring_science_facade"
order = 20
required = true
depends_on = ["wetspring"]
health_method = "health.check"
by_capability = "http_gateway"
args = []
capabilities = [
    "http.science.gonzales",
    "http.science.anderson",
    "http.render.grammar",
    "http.provenance.query",
    "http.validation.chain",
    "http.system.composition",
]

[graph.node.env]
FACADE_BIND = "127.0.0.1:3100"
FACADE_CORS_ORIGIN = "https://primals.eco"
FACADE_DARK_FOREST = "true"
