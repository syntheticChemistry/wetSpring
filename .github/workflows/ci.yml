name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  barracuda-pin:
    name: barraCuda version pin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone barraCuda (path dependency)
        run: |
          git clone --depth 1 https://github.com/ecoPrimals/barraCuda.git "${GITHUB_WORKSPACE}/../barraCuda"
      - name: Check barraCuda version pin
        run: bash scripts/check_barracuda_pin.sh

  fmt:
    name: Format (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (pedantic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D clippy::pedantic -D clippy::nursery

  test:
    name: Test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --verbose

  test-features:
    name: Test (feature matrix)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: [json, ipc, vault]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features ${{ matrix.features }} --verbose
        working-directory: barracuda

  test-all-features:
    name: Test (all features, no GPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --verbose

  validate-release:
    name: Release validators (FMA/LTO drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Vulkan stack (wgpu with --features gpu)
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers libvulkan1
      - name: Run release validation suite
        run: ./scripts/validate_release.sh

  coverage-barracuda:
    name: Coverage — barracuda (90% gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: barracuda
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage (lib + integration tests) and enforce 90% threshold
        working-directory: barracuda
        run: |
          cargo llvm-cov --lib --tests --fail-under-lines 90

  coverage-forge:
    name: Coverage — metalForge (90% gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: metalForge/forge
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage (lib + integration tests) and enforce 90% threshold
        working-directory: metalForge/forge
        run: |
          cargo llvm-cov --lib --tests --fail-under-lines 90

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  cross-musl:
    name: Cross-compile (musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: sudo apt-get install -y musl-tools
      - run: cargo check --workspace --target x86_64-unknown-linux-musl
