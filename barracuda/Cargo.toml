[package]
name = "wetspring-barracuda"
version = "0.1.0"
edition = "2024"
rust-version = "1.87"
authors = ["Squirrel Team"]
license = "AGPL-3.0-or-later"
description = "Life science + PFAS analytical chemistry pipelines — Rust + GPU via barraCuda"
repository = "https://github.com/syntheticChemistry/wetSpring"
keywords = ["bioinformatics", "mass-spectrometry", "pfas", "gpu", "wgsl"]
categories = ["science", "command-line-utilities"]

# Workspace root is wetSpring/Cargo.toml; fuzz is a workspace member there.

[features]
default = []
# GPU acceleration via barraCuda (standalone math primal).
# Enable with `cargo build --features gpu`.
# Adds wgpu v28 (device creation), barraCuda GPU ops (144+ primitives),
# and tokio (async device init). Zero local WGSL shaders (full lean).
gpu = ["barracuda/gpu", "barracuda/domain-esn", "dep:wgpu", "dep:tokio"]
# NPU acceleration via ToadStool akida-driver (BrainChip AKD1000/AKD1500).
# Enable with `cargo build --features npu`.
# Provides runtime discovery, capability-based dispatch, int8 inference.
npu = ["dep:akida-driver"]
# JSON model import (2 bins: validate_pfas_decision_tree, benchmark_three_tier).
json = ["dep:serde", "dep:serde_json"]
# IPC server for biomeOS science primal (wetspring-server binary).
# Adds JSON-RPC 2.0 over Unix socket, Songbird registration, Neural API metrics.
ipc = ["json"]
# Nautilus Shell: evolutionary reservoir computing for bio sentinel monitoring.
# Adds concept edge detection, drift monitoring, evolutionary adaptation.
nautilus = ["dep:bingocube-nautilus"]
# Genomic vault: encrypted consent-gated data storage.
# Adds ChaCha20-Poly1305 AEAD, Ed25519 signing, BLAKE3 hashing.
vault = ["dep:chacha20poly1305", "dep:ed25519-dalek", "dep:blake3"]

[dependencies]
# serde: derive Serialize/Deserialize for visualization types (petalTongue schema).
serde = { version = "1", features = ["derive"], optional = true }
# serde_json: JSON parsing for validation data and model import (2 binaries).
serde_json = { version = "1", optional = true }

# barraCuda — standalone math primal (v0.3.3, HEAD 2a6c072). Pure math + GPU compute.
# default-features = false: no wgpu/bytemuck pulled in for CPU builds.
# When `gpu` feature is active, `barracuda/gpu` enables GPU ops.
# 150+ primitives consumed. 694+ WGSL shaders. wgpu 28. MSRV 1.87.
# CPU: linalg, special, numerical, spectral, stats, sample.
# GPU: FusedMapReduceF64, BrayCurtisF64, GemmF64, BatchedOdeRK4/RK45, etc.
# Universal precision: f64-canonical with Fp64Strategy + PrecisionRoutingAdvice.
# DF64 core-streaming on consumer GPUs (~10x throughput vs throttled f64).
# New: shaders::provenance (27 cross-spring shader records, evolution_report()),
#      BatchedOdeRK45F64 (adaptive Dormand-Prince), mean_variance_to_buffer(),
#      builder patterns (HmmForwardArgs, Dada2DispatchArgs, GillespieModel, etc.).
barracuda = { path = "../../barraCuda/crates/barracuda", default-features = false }

# akida-driver — pure Rust NPU access (BrainChip AKD1000/AKD1500).
# Independent of barraCuda; sourced from toadStool neuromorphic crates.
# Runtime discovery, capability-based dispatch, zero mocks.
akida-driver = { path = "../../phase1/toadstool/crates/neuromorphic/akida-driver", optional = true }

# wgpu: WebGPU compute — hardware-agnostic GPU via Vulkan/Metal/DX12.
# Same version as barraCuda to prevent duplicate symbol linking errors.
# default-features = false disables wgpu's default feature set.
# Note: renderdoc-sys (C dep) is still pulled on native targets via wgpu-hal.
wgpu = { version = "28", optional = true, default-features = false, features = ["wgsl", "vulkan-portability"] }

# Async runtime for GPU device creation (barracuda already brings tokio in).
tokio = { version = "1", features = ["rt", "macros"], optional = true }

# bingocube-nautilus: evolutionary reservoir computing via BingoCube board populations.
# Pure Rust + serde, no GPU deps. Used for Nautilus Shell bio bridge (concept edge
# detection, drift monitoring, evolutionary adaptation for bio sentinel).
# Cross-spring provenance: primalTools/bingoCube (shared ecosystem tool).
bingocube-nautilus = { path = "../../primalTools/bingoCube/nautilus", optional = true }

# bytemuck: zero-copy casting for GPU uniform buffers (GemmCached params).
# Already a transitive dep via barracuda; pinned here for local extensions.
bytemuck = { version = "1", features = ["derive"] }

# I/O: zlib decompression (mzML binary arrays) + GzDecoder (FASTQ .gz).
# Uses miniz_oxide (pure Rust) by default — no C zlib, ecoBin compliant.
# XML parsing is sovereign (src/io/xml.rs); base64 is sovereign (src/encoding.rs).
flate2 = { version = "1.0", default-features = false, features = ["rust_backend"] }

# Vault: sovereign crypto (pure Rust, ecoBin compliant).
# ChaCha20-Poly1305 AEAD (RustCrypto), Ed25519 (dalek), BLAKE3 hashing.
# Optional — only needed for `vault` feature (genomic vault + consent).
chacha20poly1305 = { version = "0.10", optional = true }
ed25519-dalek = { version = "2.2", optional = true }
blake3 = { version = "1.8", optional = true }

[dev-dependencies]
tempfile = "3"
temp-env = "0.3"
proptest = "1"

