# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration for wetSpring barracuda crate.
#
# Aligned with workspace root deny.toml — C-dep bans are identical.
# Run: cargo deny check
# Install: cargo install cargo-deny

[graph]
targets = []
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.8
allow = [
    "AGPL-3.0",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = [
    # ecoBin compliance: zero C dependencies in application code.
    { crate = "openssl-sys", reason = "C dependency — use rustls" },
    { crate = "openssl", reason = "C dependency — use rustls" },
    { crate = "libz-sys", reason = "C dependency — use flate2 rust_backend" },
    { crate = "bzip2-sys", reason = "C dependency" },
    { crate = "lzma-sys", reason = "C dependency" },
    { crate = "zstd-sys", reason = "C dependency — use ruzstd" },
    { crate = "curl-sys", reason = "C dependency — use ureq/reqwest" },
    { crate = "libgit2-sys", reason = "C dependency — use gitoxide" },
    { crate = "libssh2-sys", reason = "C dependency" },
    { crate = "cmake", reason = "C build tool" },
    { crate = "cc", wrappers = ["blake3"], reason = "C compiler — allowed only via blake3 build-time assembly" },
    { crate = "libffi-sys", reason = "C dependency" },
    { crate = "bindgen", reason = "C header parser" },
    { crate = "pkg-config", reason = "C build tool" },
]
skip = []
skip-tree = []
workspace-default-features = "allow"
external-default-features = "allow"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
